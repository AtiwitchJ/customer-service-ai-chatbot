# ===========================================
# NGINX CONFIGURATION FOR ANGULAR SPA
# ===========================================
# Serves Angular app and proxies API requests to backend
# ให้บริการ Angular app และ proxy API requests ไปยัง backend

server {
    listen 81;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # เพิ่ม limit ขนาดไฟล์ upload (100MB)
    client_max_body_size 100M;

    # Gzip compression for better performance
    # บีบอัด Gzip เพื่อประสิทธิภาพที่ดีขึ้น
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Angular SPA routing - redirect all routes to index.html
    # Angular SPA routing - redirect ทุก routes ไปยัง index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    # Proxy API requests ไปยัง backend
    location /api/ {
        proxy_pass http://admin-backend:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings for file uploads
        # ตั้งค่า timeout สำหรับการอัปโหลดไฟล์
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable buffering for streaming responses
        # ปิด buffering สำหรับ streaming responses
        proxy_buffering off;
    }

    # Cache static assets
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
