# ===========================================
# LATTE CS-BOT DEV ENVIRONMENT
# All services with bind mounts (local files)
# ===========================================
#
# Usage:
#   Start:   docker compose -f docker-compose.dev.yml up -d
#   Stop:    docker compose -f docker-compose.dev.yml down
#   Destroy: docker compose -f docker-compose.dev.yml down -v --remove-orphans
#
# ===========================================

name: latte-csbot-dev

# Docker Hub authentication to increase rate limit
# Run: docker login -u your_username before running compose
# Or set up credentials in ~/.docker/config.json

services:
  # ==========================================
  # LLM Service - Ollama
  # ==========================================
  ollama:
    container_name: latte-ollama
    image: ollama/ollama:0.17.0
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
    networks:
      - latte-network

  # ==========================================
  # MongoDB - Document Database
  # ==========================================
  mongodb:
    container_name: latte-mongodb
    image: mongo:8.2
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-chatbot}
    volumes:
      - ./volumes/mongodb/data:/data/db
      - ./volumes/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - latte-network

  # ==========================================
  # Redis - Cache Services
  # ==========================================
  redis:
    container_name: latte-redis
    image: redis/redis-stack:7.4.0-v8
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8002}:8001"
    volumes:
      - ./volumes/redis/data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - latte-network

  # ==========================================
  # Admin Services
  # ==========================================

  admin-backend:
    build:
      context: ./latte-csbot-admin
      dockerfile: docker/admin-backend.Dockerfile
    container_name: latte-admin-backend
    ports:
      - "${ADMIN_PORT:-3002}:3002"
      - "${DEBUG_PORT:-9229}:9229"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${ADMIN_PORT}
      - CACHE_UPDATE_INTERVAL=${CACHE_UPDATE_INTERVAL}
      - CACHE_STARTUP_DELAY=${CACHE_STARTUP_DELAY}
      - AUTO_CACHE_UPDATE=${AUTO_CACHE_UPDATE}
      - DEBUG=${DEBUG}
      - RAG_UPLOAD_PROXY_URL=${RAG_UPLOAD_PROXY_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
    volumes:
      - ./latte-csbot-admin/backend/src:/app/src
      - ./latte-csbot-admin/import-data:/app/import
      - ./latte-csbot-admin/backend/src/tools:/app/tools
      - ./admin-backend-cache:/app/cache
      - ./admin-dashboard-cache:/app/src/dashboard_service/utils
      - ./admin-json-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3002/api/overview",
        ]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - latte-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin-frontend:
    build:
      context: ./latte-csbot-admin
      dockerfile: docker/admin-frontend.Dockerfile
    container_name: latte-admin-frontend
    ports:
      - "${ADMIN_FRONTEND_PORT:-81}:81"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - ./latte-csbot-admin/frontend/src:/app/src
      - ./latte-csbot-admin/frontend/public:/app/public
    depends_on:
      admin-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:81/",
        ]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: 3
    networks:
      - latte-network

  multimodal-rag-upload:
    build:
      context: ./latte-csbot-admin/upload_file
      dockerfile: Dockerfile
    container_name: latte-multimodal-rag
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
      - OLLAMA_TAGGING_MODEL=${OLLAMA_TAGGING_MODEL}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL}
      - DISABLE_DOCLING_OCR=${DISABLE_DOCLING_OCR}
      - OCR_CONCURRENCY=${OCR_CONCURRENCY}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE}
      - CHUNK_SIZE=${CHUNK_SIZE}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "${RAG_UPLOAD_PORT:-8001}:8001"
    volumes:
      - ./latte-csbot-admin/upload_file:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - latte-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # User Chat Services
  # ==========================================

  user-frontend:
    build:
      context: ./latte-csbot-user-v1
      dockerfile: docker/frontend.Dockerfile
    container_name: latte-user-frontend
    ports:
      - "${USER_FRONTEND_PORT:-80}:80"
    volumes:
      - ./latte-csbot-user-v1/frontend:/usr/share/nginx/html
    depends_on:
      user-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - latte-network

  user-backend:
    build:
      context: ./latte-csbot-user-v1
      dockerfile: docker/backend.Dockerfile
    container_name: latte-user-backend
    ports:
      - "${USER_BACKEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${USER_BACKEND_PORT}
      - MONGO_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_CHAT_DB=${REDIS_CHAT_DB}
      - REDIS_VERIFY_DB=${REDIS_VERIFY_DB}
      - REDIS_QUEUE_DB=${REDIS_QUEUE_DB}
      - REDIS_MEMORY_DB=${REDIS_MEMORY_DB}
      - REDIS_SESSION_TTL=${REDIS_SESSION_TTL}
      - REDIS_CHAT_HISTORY_LIMIT=${REDIS_CHAT_HISTORY_LIMIT}
      - AGENT_WEBHOOK_URL=${AGENT_WEBHOOK_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - AI_AGENT_QUEUE_NAME=${AI_AGENT_QUEUE_NAME}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS}
      - BLOCK_DURATION_MS=${BLOCK_DURATION_MS}
      - CHAT_RATE_LIMIT_WINDOW_MS=60000
      - CHAT_RATE_LIMIT_MAX=60
      - EXTERNAL_AUTH_API=${EXTERNAL_AUTH_API}
      - AUTH_BYPASS_MODE=${AUTH_BYPASS_MODE}
    volumes:
      - ./latte-csbot-user-v1/backend/src:/app/src
      - ./latte-csbot-user-v1/latte-csbot_ai-agent:/app/latte-csbot_ai-agent
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/config",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - latte-network
    depends_on:
      - redis

  ai-agent:
    build:
      context: ./latte-csbot-user-v1
      dockerfile: docker/ai-agent.Dockerfile
    container_name: latte-ai-agent
    ports:
      - "${AI_AGENT_PORT:-8765}:${AI_AGENT_PORT}"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - AI_AGENT_PORT=${AI_AGENT_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_QUEUE_DB=${REDIS_QUEUE_DB}
      - REDIS_VERIFY_DB=${REDIS_VERIFY_DB}
      - REDIS_COOLDOWN_DB=${REDIS_COOLDOWN_DB}
      - AI_AGENT_QUEUE_NAME=${AI_AGENT_QUEUE_NAME}
      - MS_FORM_QUEUE_NAME=${MS_FORM_QUEUE_NAME}
      - RESET_PASSWORD_QUEUE_NAME=${RESET_PASSWORD_QUEUE_NAME}
      - AGENT_WEBHOOK_URL=${AGENT_WEBHOOK_URL}
      - API_BASE=${API_BASE}
      - MS_FORMS_REPORT_URL=${MS_FORMS_REPORT_URL}
    volumes:
      - ./latte-csbot-user-v1/latte-csbot_ai-agent:/app
    depends_on:
      user-backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8765/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - latte-network
    command: ["node", "ai-agent.js"]

# ===========================================
# Networks
# ===========================================
networks:
  latte-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  ollama_data:
  mongo_data:
  redis_data:
  admin-backend-cache:
  admin-dashboard-cache:
  admin-json-data:
