server {
    listen 80;
    server_name localhost;
    
    # ===========================================
    # HTTPS Redirect (Production)
    # ===========================================
    # Uncomment for production with SSL certificate
    # return 301 https://$server_name$request_uri;
    
    # ===========================================
    # OWASP Security: Hide Server Version
    # ZAP Fix: Server Leaks Version Information
    # ===========================================
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ===========================================
    # OWASP Security Headers
    # ===========================================
    
    # ZAP Fix: X-Frame-Options - ป้องกัน Clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # ZAP Fix: X-Content-Type-Options - ป้องกัน MIME Sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # ZAP Fix: X-XSS-Protection - ป้องกัน XSS (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy - ควบคุมข้อมูล Referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ZAP Fix: HSTS - บังคับใช้ HTTPS (uncomment for production)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Permissions Policy - จำกัดการใช้ features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    
    # ZAP Fix: Content Security Policy (CSP) - ป้องกัน XSS และ Injection
    # Note: 'unsafe-inline' is required for inline event handlers (onclick) in HTML
    # For production, consider refactoring to use addEventListener instead
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: *; connect-src 'self' ws://192.168.1.200 wss://192.168.1.200 ws://localhost:3000 wss://localhost:3000 https://api.ipify.org http://localhost:8000; font-src 'self' https://fonts.gstatic.com; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ===========================================
    # Gzip Compression
    # ===========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ===========================================
    # Main Location
    # ===========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===========================================
    # Proxy API requests to backend
    # ===========================================
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Security: Hide backend server info
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ===========================================
    # WebSocket proxy
    # ===========================================
    # ===========================================
    # WebSocket proxy
    # ===========================================
    location /ws {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        
        # Security: Hide backend server info
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ===========================================
    # Storage Proxy (Direct to Supabase Storage)
    # ===========================================
    # Use ^~ to prevent regex locations (like .png) from hijacking the request
    location ^~ /storage/v1/ {
        # Proxy directly to storage service, bypassing Kong
        # Matches Kong's behavior: strip /storage/v1/ prefix
        proxy_pass http://storage:5000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Powered-By;

        # Buffer settings for large files
        proxy_buffering off;
    }

    # ===========================================
    # Cache static assets with security headers
    # ===========================================
    location ~* \.(jpg|jpeg|png|gif|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
